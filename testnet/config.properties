# 网络连通性检测工具 - 配置文件
# 请根据实际情况修改以下配置

# ========== Excel 文件配置 ==========
# Excel 文件路径（多个文件用逗号分隔）
excel.files=NASP-ACL-20260203-024.xls,NASP-ACL-20260225-017.xls

# 报告输出文件
report.file=network_test_report.txt

# ========== 端口检测配置 ==========
# 端口检测超时时间（秒）
port.check.timeout=5

# ========== 源服务器 SSH 连接配置 ==========
# 格式：ssh.{编号}.host={主机地址}
#       ssh.{编号}.port={SSH端口}
#       ssh.{编号}.username={用户名}
#       ssh.{编号}.password={密码}
#
# 示例（请修改为实际的服务器信息）：

# 源服务器 1
# ssh.1.host=192.168.1.100
# ssh.1.port=22
# ssh.1.username=root
# ssh.1.password=your_password

# 源服务器 2
# ssh.2.host=192.168.1.101
# ssh.2.port=22
# ssh.2.username=admin
# ssh.2.password=your_password

# ========== 注意事项 ==========
# 1. 需要为 Excel 表格中 F 列的每个源地址配置对应的 SSH 连接
# 2. host 的值必须与 Excel 中 F 列的地址完全一致
# 3. 确保 SSH 用户有权限在源服务器上执行 nc/telnet 命令
# 4. 确保源服务器已安装 nc (netcat) 工具（telnet 作为备选）
